<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HRank - Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>

<body class="gradient-bg min-h-screen flex flex-col items-center justify-center p-4 text-white">
    <div class="max-w-md w-full">
        <!-- Logo Section -->
        <div class="text-center mb-10 animate-float">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-3xl shadow-2xl text-white mb-6">
                <i class="fas fa-shield-halved text-4xl"></i>
            </div>
            <h1 class="text-4xl font-black tracking-tight text-white mb-2">ADMIN PANEL</h1>
            <p class="text-indigo-300/60 font-medium uppercase tracking-widest text-xs">Security Checkpoint</p>
        </div>

        <!-- Login Card -->
        <div class="glass rounded-3xl shadow-2xl p-8 border border-white/10">
            <form th:action="@{/admin/login}" method="post" class="space-y-8">
                <div>
                    <label for="password" class="block text-xs font-bold text-indigo-300 uppercase tracking-widest mb-3 ml-1">Admin Access Key</label>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-indigo-400">
                            <i class="fas fa-lock text-lg"></i>
                        </span>
                        <input type="password" id="password" name="password" required
                            class="w-full pl-14 pr-5 py-5 bg-white/5 border border-white/10 rounded-2xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-xl font-bold tracking-[0.3em] placeholder:text-white/10 placeholder:font-normal placeholder:tracking-normal outline-none"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit"
                    class="w-full py-5 bg-indigo-600 text-white font-black rounded-2xl shadow-xl shadow-indigo-500/20 hover:bg-indigo-700 hover:shadow-indigo-500/40 transition-all transform active:scale-[0.98] flex items-center justify-center group">
                    AUTHORIZE ACCESS
                    <i class="fas fa-arrow-right ml-3 text-sm group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>

            <div th:if="${error}"
                class="mt-6 p-4 bg-red-500/10 border border-red-500/20 text-red-400 rounded-2xl text-center font-bold text-sm flex items-center justify-center">
                <i class="fas fa-circle-exclamation mr-3"></i>
                <span th:text="${error}">Invalid password</span>
            </div>
        </div>

        <p class="text-center text-[10px] text-indigo-300/30 mt-12 uppercase tracking-[0.2em] font-bold">
            Authorized Personnel Only • &copy; 2026 HRank
        </p>
    </div>
</body>

</html>
