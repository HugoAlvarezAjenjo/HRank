<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <title>Display Hackatón</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/scoreboard.css}">
</head>

<body class="bg-gray-100 min-h-screen">
    <!-- Header with dual logos -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex items-center justify-between max-w-4xl mx-auto">
                <!-- Primer logo -->
                <div class="bg-white rounded-lg m-2 flex items-center justify-center w-16 h-16">
                    <img th:src="@{/img/NextDigitalLogo.jpg}" alt="Logo" class="rounded object-contain" />
                </div>

                <!-- Texto centrado -->
                <div class="text-center">
                    <h1 class="text-2xl md:text-3xl font-bold"
                        th:text="${competitionConfig?.title ?: 'Progreso de Equipos'}">Progreso de Equipos</h1>
                    <p class="text-blue-100"
                        th:text="${competitionConfig?.title != null ? 'Evento en Vivo' : 'Hackatón Next - UPM 2025'}">
                        Hackatón Next - UPM 2025</p>
                </div>

                <!-- Segundo logo -->
                <div class="bg-white rounded-lg m-2 flex items-center justify-center w-16 h-16">
                    <img th:src="@{/img/EtsisiLogo.png}" alt="Logo" class="rounded object-contain" />
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Stats bar -->
        <div class="bg-white rounded-lg shadow-md p-4 mb-8">
            <div class="flex flex-wrap justify-between items-center">
                <div class="flex items-center mb-2 sm:mb-0">
                    <i class="fas fa-users text-blue-500 mr-2"></i>
                    <span class="font-medium">Equipos activos: <span id="teamCount" class="font-bold">0</span></span>
                </div>
                <div class="flex items-center mb-2 sm:mb-0">
                    <i class="fas fa-chart-line text-green-500 mr-2"></i>
                    <span class="font-medium">Progreso promedio: <span id="avgProgress"
                            class="font-bold">0%</span></span>
                </div>
                <div class="flex items-center mb-2 sm:mb-0">
                    <i class="fas fa-hourglass-half text-indigo-500 mr-2"></i>
                    <span class="font-medium">Tiempo restante: <span id="countdown"
                            class="font-bold text-lg text-indigo-700">--:--:--</span></span>
                </div>
                <div class="flex items-center">
                    <i class="fas fa-clock text-orange-500 mr-2"></i>
                    <span class="font-medium">Última actualización: <span id="lastUpdate"
                            class="font-bold">--:--:--</span></span>
                </div>
            </div>
        </div>

        <!-- Teams display - JavaScript will inject content -->
        <div id="teamContainer" class="bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-8 text-center text-gray-500">
                <i class="fas fa-spinner fa-spin text-2xl mb-2"></i>
                <p>Cargando datos de equipos...</p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

    <script th:src="@{/js/scoreboard.js}"></script>
</body>

</html>
