<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackatón HRank - Acceso</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #6b73ff 0%, #000dff 100%);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col items-center justify-center p-4">
    <div class="max-w-md w-full">
        <!-- Logo/Icon Section -->
        <div class="text-center mb-8 animate-float">
            <div
                class="inline-flex items-center justify-center w-20 h-20 bg-blue-600 rounded-3xl shadow-2xl text-white mb-4">
                <i class="fas fa-rocket text-4xl"></i>
            </div>
            <h1 class="text-3xl font-black text-gray-900 tracking-tight"
                th:text="${competitionConfig?.title ?: 'HRANK PRO'}">HRANK PRO</h1>
            <p class="text-gray-500 font-medium">Portal de participación Hackatón</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="accessForm" class="space-y-6">
                <div>
                    <label for="teamCode" class="block text-sm font-bold text-gray-700 mb-2 ml-1">CÓDIGO DE
                        EQUIPO</label>
                    <input type="text" id="teamCode" name="teamCode" required
                        class="w-full px-5 py-4 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-center text-xl font-bold tracking-widest uppercase placeholder:text-gray-300 placeholder:font-normal placeholder:tracking-normal"
                        placeholder="Introduce tu código">
                </div>

                <button type="submit"
                    class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-500/30 hover:bg-blue-700 hover:shadow-blue-500/40 transition-all transform active:scale-95 flex items-center justify-center">
                    ENTRAR A MI PANEL
                    <i class="fas fa-arrow-right ml-2 text-sm"></i>
                </button>
            </form>

            <div th:if="${param.error}"
                class="mt-4 p-4 bg-red-100 text-red-700 rounded-xl text-center font-bold text-sm">
                <i class="fas fa-exclamation-triangle mr-2"></i> Código no válido. Revisa tu código e intenta de nuevo.
            </div>

            <div class="mt-8 pt-8 border-t border-gray-50">
                <a th:href="@{/scoreboard}"
                    class="w-full py-4 border-2 border-gray-100 text-gray-600 font-bold rounded-2xl hover:bg-gray-50 transition-all flex items-center justify-center">
                    <i class="fas fa-chart-line mr-2 text-blue-500"></i>
                    VER SCOREBOARD EN VIVO
                </a>
            </div>
        </div>

        <p class="text-center text-xs text-gray-400 mt-8">
            &copy; 2026 Hackatón HRank - Next Digital & Etsisi UPM
        </p>
    </div>

    <script>
        document.getElementById('accessForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const code = document.getElementById('teamCode').value.trim();
            if (code) {
                window.location.href = '/team/' + code;
            }
        });
    </script>
</body>

</html>
