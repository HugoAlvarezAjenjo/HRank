<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Hackatón</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #6b73ff 0%, #000dff 100%);
        }
        .team-row:hover {
            background-color: #f8f9fa;

            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .progress-bar {
            height: 10px;
            border-radius: 5px;
            background-color: #e9ecef;
        }
        .progress-fill {
            height: 100%;
            border-radius: 5px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50">
<div class="min-h-screen">
    <!-- Header -->
    <header class="gradient-bg text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <div class="flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <i class="fas fa-laptop-code text-3xl"></i>
                    <h1 class="text-2xl font-bold">Panel de Administración Hackatón</h1>
                </div>
                <div class="flex items-center space-x-4">
                        <span class="bg-white text-blue-600 px-3 py-1 rounded-full text-sm font-semibold">
                            <i class="fas fa-user-shield mr-1"></i> Admin
                        </span>
                </div>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <!-- Create Team Section -->
        <section class="mb-12 bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-blue-50 px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-plus-circle text-blue-500 mr-2"></i> Crear Nuevo Equipo
                </h2>
            </div>
            <div class="p-6">
                <form th:action="@{/admin/create}" method="post" class="space-y-4">
                    <div class="flex flex-col md:flex-row md:items-center md:space-x-4">
                        <div class="flex-1">
                            <label for="team-name" class="block text-sm font-medium text-gray-700 mb-1">
                                Nombre del equipo
                            </label>
                            <input type="text" id="team-name" name="name" required
                                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                   placeholder="Ingrese el nombre del equipo">
                        </div>
                        <div class="mt-4 md:mt-0">
                            <button type="submit"
                                    class="w-full md:w-auto px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
                                <i class="fas fa-user-plus mr-2"></i> Añadir equipo
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </section>

        <!-- Teams List Section -->
        <section class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="bg-blue-50 px-6 py-4 border-b border-gray-200">
                <h2 class="text-xl font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-users text-blue-500 mr-2"></i> Equipos Registrados
                </h2>
            </div>

            <form th:action="@{/admin/save}" th:object="${teamsWrapper}" method="post" class="divide-y divide-gray-200">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Equipo
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Fase
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Progreso
                            </th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Porcentaje
                            </th>
                        </tr>
                        </thead>
                        <tbody class="bg-white divide-y divide-gray-200">
                        <tr th:each="team, stat : *{teams}" class="team-row transition-all duration-200">
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <div class="flex-shrink-0 h-10 w-10 bg-blue-100 rounded-full flex items-center justify-center">
                                        <i class="fas fa-users text-blue-600"></i>
                                    </div>
                                    <div class="ml-4">
                                        <div class="text-sm font-medium text-gray-900" th:text="*{teams[__${stat.index}__].name}"></div>
                                    </div>
                                    <input type="hidden" th:field="*{teams[__${stat.index}__].id}" />
                                    <input type="hidden" th:field="*{teams[__${stat.index}__].name}" />
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <select th:field="*{teams[__${stat.index}__].phase}"
                                        class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md">
                                    <option th:each="phase : ${phases}" th:value="${phase}" th:text="${phase}"></option>
                                </select>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="progress-bar">
                                    <div class="progress-fill" th:style="'width:' + *{teams[__${stat.index}__].percentage} + '%'"></div>
                                </div>
                            </td>
                            <td class="px-6 py-4 whitespace-nowrap">
                                <div class="flex items-center">
                                    <input type="number" min="0" max="100" th:field="*{teams[__${stat.index}__].percentage}"
                                           class="w-20 px-3 py-1 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                                    <span class="ml-2 text-sm text-gray-500">%</span>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="px-6 py-4 bg-gray-50 text-right">
                    <button type="submit"
                            class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                        <i class="fas fa-save mr-2"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </section>
    </main>
</div>

<script>
    // Simple animation for progress bars on page load
    document.addEventListener('DOMContentLoaded', function() {
        const progressBars = document.querySelectorAll('.progress-fill');
        progressBars.forEach(bar => {
            const width = bar.style.width;
            bar.style.width = '0';
            setTimeout(() => {
                bar.style.width = width;
            }, 100);
        });
    });
</script>
</body>
</html>
