<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Groups</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #6b73ff 0%, #000dff 100%);
        }

        .team-row:hover {
            background-color: #f8f9fa;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .delete-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 6px rgba(239, 68, 68, 0.3);
        }

        .confirmation-modal {
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="bg-gray-50">
<header class="gradient-bg text-white shadow-lg">
    <div class="container mx-auto px-4 py-6">
        <div class="flex justify-between items-center">
            <div class="flex items-center space-x-4">
                <i class="fas fa-laptop-code text-3xl"></i>
                <h1 class="text-2xl font-bold">Panel de Administración Hackatón</h1>
            </div>
            <div class="flex items-center space-x-4">
                    <span class="bg-white text-blue-600 px-3 py-1 rounded-full text-sm font-semibold">
                        <i class="fas fa-user-shield mr-1"></i> Admin
                    </span>
            </div>
        </div>
    </div>
</header>

<main class="container mx-auto px-4 py-8">
    <!-- Delete Team Section -->
    <section class="bg-white rounded-xl shadow-md overflow-hidden">
        <div class="bg-blue-50 px-6 py-4 border-b border-gray-200">
            <div class="flex justify-between items-center">
                <h2 class="text-xl font-semibold text-gray-800 flex items-center">
                    <i class="fas fa-trash-alt text-red-500 mr-2"></i> Eliminar Equipos
                </h2>
                <a th:href="@{/admin}" class="text-sm text-blue-600 hover:text-blue-800 flex items-center">
                    <i class="fas fa-arrow-left mr-1"></i> Volver al panel
                </a>
            </div>
        </div>
        <div class="overflow-hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                <tr>
                    <th scope="col"
                        class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Equipo
                    </th>
                    <th scope="col"
                        class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">
                        Acciones
                    </th>
                </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200" id="teams-list">
                <tr th:each="team : ${teams}" class="team-row transition-all duration-200">
                    <td th:text="${team.name}" class="px-6 py-4 whitespace-nowrap">
                        Nombre de Equipo
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                        <form th:action="@{/admin/delete/{id}(id=${team.id})}" method="post" class="inline">
                            <button type="submit" class="delete-btn px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-all duration-200">
                                <i class="fas fa-trash-alt mr-2"></i> Eliminar
                            </button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</body>
</html>
